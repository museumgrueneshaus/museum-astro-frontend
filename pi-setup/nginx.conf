server {
    listen 80;
    server_name localhost;

    root /var/www/museum;
    index index.html;

    # HTML files: short cache so updates are picked up quickly
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=3600";
    }

    # Astro build assets: content-addressed filenames, cache forever
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Local video files
    location /videos/ {
        alias /var/www/museum/videos/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Kiosk identity config
    location = /kiosk-config.json {
        alias /etc/museum-kiosk/kiosk-id.json;
        add_header Cache-Control "no-store";
        default_type application/json;
    }

    # SPA fallback: try the file, then fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
